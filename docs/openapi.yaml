openapi: "3.1.0"
info:
  title: SODL API
  description: |
    Cross-app, cross-platform REST API for SODL — a content-addressed,
    lineage-aware, policy-governed storage system.

    SODL is a **general-purpose pluggable library**.  Any application can
    store, share, derive, pin, and verify binary content through this API.
  version: "1.0.0"
  license:
    name: MIT

servers:
  - url: http://127.0.0.1:7700
    description: Local development (default)

tags:
  - name: Health
  - name: Upload
  - name: Origins
  - name: Blobs
  - name: Shares
  - name: Derivations
  - name: Pins
  - name: Lineage
  - name: Provenance

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness / version check
      operationId: health
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /v1/health:
    get:
      tags: [Health]
      summary: Versioned liveness / version check
      operationId: healthV1
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /v1/upload:
    post:
      tags: [Upload]
      summary: Upload bytes and create an Origin
      operationId: upload
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [meta, file]
              properties:
                meta:
                  description: JSON metadata for the upload
                  type: string
                  contentMediaType: application/json
                  contentSchema:
                    $ref: "#/components/schemas/UploadMeta"
                file:
                  type: string
                  format: binary
                  description: Raw file bytes
      responses:
        "201":
          description: Origin created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/provenance/resolve:
    post:
      tags: [Provenance]
      summary: Resolve provenance candidates for upload bytes
      operationId: resolveProvenance
      description: |
        Computes internal payload and chunk fingerprints without storing the
        submitted file. Returns exact-payload and chunk-overlap candidates for
        existing origins. This endpoint supports upload flows that need to
        preserve origin provenance across re-uploads, cuts, and future
        media/document mutation resolvers.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                meta:
                  description: Optional JSON metadata reserved for media-aware resolvers
                  type: string
                  contentMediaType: application/json
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Provenance candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveProvenanceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/origins:
    get:
      tags: [Origins]
      summary: List tracked origins
      operationId: listOrigins
      responses:
        "200":
          description: Origin list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOriginsResponse"
    post:
      tags: [Origins]
      summary: Create an origin record from existing blobs
      operationId: createOrigin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOriginRequest"
      responses:
        "201":
          description: Origin created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OriginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/origins/{id}:
    get:
      tags: [Origins]
      summary: Get origin metadata
      operationId: getOrigin
      parameters:
        - $ref: "#/components/parameters/OriginId"
      responses:
        "200":
          description: Origin found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OriginResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Origins]
      summary: Tombstone an origin
      operationId: tombstoneOrigin
      parameters:
        - $ref: "#/components/parameters/OriginId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TombstoneRequest"
      responses:
        "204":
          description: Origin tombstoned
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/origins/{id}/lineage-proof:
    get:
      tags: [Lineage]
      summary: Compute lineage proof digest
      operationId: lineageProof
      parameters:
        - $ref: "#/components/parameters/OriginId"
      responses:
        "200":
          description: Lineage proof
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LineageProofResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/origins/{id}/payload:
    get:
      tags: [Origins]
      summary: Fetch reassembled & decrypted payload bytes
      description: |
        Transparently reassembles chunked content and decrypts it.
        Works identically for both chunked and non-chunked origins.
      operationId: getPayload
      parameters:
        - $ref: "#/components/parameters/OriginId"
      responses:
        "200":
          description: Decrypted payload bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/origins/{id}/representations:
    get:
      tags: [Origins]
      summary: List representations for an origin
      operationId: listOriginRepresentations
      parameters:
        - $ref: "#/components/parameters/OriginId"
      responses:
        "200":
          description: Representation list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepresentationsResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/blobs:
    post:
      tags: [Blobs]
      summary: Store raw blob bytes by content address
      operationId: createBlob
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Blob already existed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlobCreateResponse"
        "201":
          description: Blob stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlobCreateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/blobs/{id}:
    get:
      tags: [Blobs]
      summary: Download raw blob bytes by content-address
      operationId: getBlob
      parameters:
        - name: id
          in: path
          required: true
          description: "Content-address, e.g. `blake3:<hex>`"
          schema:
            type: string
      responses:
        "200":
          description: Blob bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Blobs]
      summary: Delete an unreferenced blob
      operationId: deleteBlob
      parameters:
        - name: id
          in: path
          required: true
          description: "Content-address, e.g. `blake3:<hex>`"
          schema:
            type: string
      responses:
        "204":
          description: Blob deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/shares:
    post:
      tags: [Shares]
      summary: Create a share (principal → principal)
      operationId: createShare
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShareRequest"
      responses:
        "201":
          description: Share created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/shares/{id}:
    get:
      tags: [Shares]
      summary: Get share record
      operationId: getShare
      parameters:
        - $ref: "#/components/parameters/ShareId"
      responses:
        "200":
          description: Share found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Shares]
      summary: Revoke / release a share
      operationId: releaseShare
      parameters:
        - $ref: "#/components/parameters/ShareId"
      responses:
        "204":
          description: Share released
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/shares/{id}/verify:
    post:
      tags: [Shares]
      summary: Verify share lineage proof integrity
      operationId: verifyShare
      parameters:
        - $ref: "#/components/parameters/ShareId"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/derivations:
    post:
      tags: [Derivations]
      summary: Declare a derivation from an existing origin
      operationId: createDerivation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeriveRequest"
      responses:
        "201":
          description: Derivation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeriveResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/pins:
    post:
      tags: [Pins]
      summary: Pin an origin (request durability)
      operationId: createPin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PinRequest"
      responses:
        "201":
          description: Pin created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/pins/{id}:
    delete:
      tags: [Pins]
      summary: Release a pin
      operationId: releasePin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Pin released
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    OriginId:
      name: id
      in: path
      required: true
      description: Origin UUID
      schema:
        type: string
        format: uuid
    ShareId:
      name: id
      in: path
      required: true
      description: "Share identifier (e.g. `share:<uuid>`)"
      schema:
        type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: sodl-v1

    UploadMeta:
      type: object
      required: [owner, media_kind]
      properties:
        owner:
          type: string
          description: "Principal ID (e.g. `user:alice`, `app:my-service`)"
          example: "user:alice"
        media_kind:
          type: string
          enum: [binary, image, audio, video, document, ai_model]
          example: document
        mime:
          type: string
          example: application/pdf
        durability:
          type: string
          enum: [ephemeral, best_effort, durable]
          default: best_effort

    UploadResponse:
      type: object
      required: [origin_id, blob_id, chunked]
      properties:
        origin_id:
          type: string
          format: uuid
        blob_id:
          type: string
          description: "Content-address of root blob (manifest or inline)"
        chunked:
          type: boolean
          description: "True when the payload was split into chunks"
        chunk_blobs:
          type: array
          description: "Content-addresses of individual chunk blobs (omitted when empty)"
          items:
            type: string

    ResolveProvenanceResponse:
      type: object
      required: [payload_fingerprint, chunk_count, candidates]
      properties:
        payload_fingerprint:
          type: string
          description: Internal plaintext-side fingerprint used for exact provenance matching
        chunk_count:
          type: integer
          description: Number of submitted chunk fingerprints considered
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/ProvenanceCandidate"

    ProvenanceCandidate:
      type: object
      required: [origin_id, match_kind, confidence]
      properties:
        origin_id:
          type: string
          format: uuid
        match_kind:
          type: string
          enum: [exact_payload, chunk_overlap]
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
        matched_chunks:
          type: integer
          nullable: true
        total_chunks:
          type: integer
          nullable: true
        ratio:
          type: number
          format: float
          nullable: true

    CreateRepresentationRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        media_kind:
          type: string
          default: binary
        mime:
          type: string
          nullable: true
        size_bytes:
          type: integer
          format: int64
          nullable: true
        root_blobs:
          type: array
          items:
            type: string

    CreateOriginRequest:
      type: object
      properties:
        owner:
          type: string
          nullable: true
        media_kind:
          type: string
          default: binary
        durability:
          type: string
          enum: [ephemeral, best_effort, durable]
          default: best_effort
        representations:
          type: array
          items:
            $ref: "#/components/schemas/CreateRepresentationRequest"

    BlobCreateResponse:
      type: object
      required: [blob_id, existed, size_bytes]
      properties:
        blob_id:
          type: string
        existed:
          type: boolean
        size_bytes:
          type: integer

    ListOriginsResponse:
      type: object
      required: [origins]
      properties:
        origins:
          type: array
          items:
            $ref: "#/components/schemas/OriginResponse"

    OriginResponse:
      type: object
      required: [origin_id, media_kind, durability, created_at, representations]
      properties:
        origin_id:
          type: string
          format: uuid
        media_kind:
          type: string
        durability:
          type: string
        created_at:
          type: string
          format: date-time
        tombstoned_at:
          type: string
          format: date-time
          nullable: true
        owner:
          type: string
          nullable: true
        representations:
          type: array
          items:
            $ref: "#/components/schemas/Representation"

    Representation:
      type: object
      properties:
        name:
          type: string
        media_kind:
          type: string
        mime:
          type: string
          nullable: true
        size_bytes:
          type: integer
          format: int64
          nullable: true
        root_blobs:
          type: array
          items:
            type: string

    RepresentationsResponse:
      type: object
      required: [origin_id, representations]
      properties:
        origin_id:
          type: string
          format: uuid
        representations:
          type: array
          items:
            $ref: "#/components/schemas/Representation"

    ShareRequest:
      type: object
      required: [from, to, origin_id]
      properties:
        from:
          type: string
          example: "user:alice"
        to:
          type: string
          example: "user:bob"
        origin_id:
          type: string
          format: uuid
        capabilities:
          type: array
          items:
            type: string
            enum: [read, reshare, derive, pin, admin]
          default: [read]

    ShareResponse:
      type: object
      required: [share_id, origin_id]
      properties:
        share_id:
          type: string
        origin_id:
          type: string

    ShareDetailResponse:
      type: object
      required: [share_id, origin_id, from, to, capabilities, created_at, lineage_proof_digest]
      properties:
        share_id:
          type: string
        origin_id:
          type: string
        from:
          type: string
        to:
          type: string
        capabilities:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        lineage_proof_digest:
          type: string

    DeriveRequest:
      type: object
      required: [origin_id, kind]
      properties:
        origin_id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [trim, crop, transform]
        description:
          type: string
        media_kind:
          type: string
          default: binary

    DeriveResponse:
      type: object
      required: [derivation_id, origin_id]
      properties:
        derivation_id:
          type: string
        origin_id:
          type: string

    PinRequest:
      type: object
      required: [origin_id, requested_by]
      properties:
        origin_id:
          type: string
          format: uuid
        requested_by:
          type: string
          example: "user:alice"
        min_replicas:
          type: integer
          minimum: 1
          default: 1

    PinResponse:
      type: object
      required: [pin_id, origin_id]
      properties:
        pin_id:
          type: string
        origin_id:
          type: string

    TombstoneRequest:
      type: object
      properties:
        reason:
          type: string
          default: "deleted by owner"

    LineageProofResponse:
      type: object
      required: [origin_id, digest, created_at]
      properties:
        origin_id:
          type: string
          format: uuid
        digest:
          type: string
          description: Blake3 hex digest over canonicalized lineage edges
        created_at:
          type: string
          format: date-time

    VerifyResponse:
      type: object
      required: [share_id, valid]
      properties:
        share_id:
          type: string
        valid:
          type: boolean

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
